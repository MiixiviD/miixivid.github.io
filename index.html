        body { font-family: 'Eczar', serif; }

        .particle-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
        }
        .particle {
            position: absolute; bottom: -5%;
            width: 3px; height: 3px; border-radius: 50%;
            background: #8b0000; opacity: 0.6;
            animation: rise 8s linear infinite, drift 4s ease-in-out infinite;
        }
        @keyframes rise { 0% { bottom: -5%; opacity: 0.6; } 100% { bottom: 105%; opacity: 0; } }
        @keyframes drift { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(30px); } }
        .particle:nth-child(1) { left: 5%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 15%; animation-delay: 2s; width: 2px; height: 2px; }
        .particle:nth-child(3) { left: 25%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 35%; animation-delay: 1s; width: 4px; height: 4px; }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; }
        .particle:nth-child(6) { left: 65%; animation-delay: 5s; width: 2px; height: 2px; }
        .particle:nth-child(7) { left: 75%; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 85%; animation-delay: 6s; width: 4px; height: 4px; }
        .particle:nth-child(9) { left: 92%; animation-delay: 1.5s; }

        .gothic-btn {
            display: block; text-decoration: none; padding: 12px;
            margin: 8px 0; border-radius: 24px;
            border: 1px solid rgba(139, 0, 0, 0.4);
            background: rgba(20, 0, 0, 0.6);
            color: #d4c4a8; font-weight: 500; font-size: 0.9rem;
            transition: all 0.3s ease; text-align: center;
            font-family: 'Eczar', serif;
        }
        .gothic-btn:hover {
            background: rgba(139, 0, 0, 0.3);
            border-color: #8b0000;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(139, 0, 0, 0.4);
        }
        .col .gothic-btn {
            border-color: rgba(139, 0, 0, 0.6);
        }
        .xivid-col .gothic-btn {
            border-color: rgba(75, 0, 130, 0.6);
        }
        .xivid-col .gothic-btn:hover {

            box-shadow: 0 4px 20px rgba(75, 0, 130, 0.4);
        }
        .shared-links .gothic-btn {

            background: rgba(184, 134, 11, 0.15);
        }
        .shared-links .gothic-btn:hover {
            background: rgba(184, 134, 11, 0.25);
            border-color: #b8860b;
            box-shadow: 0 4px 20px rgba(184, 134, 11, 0.3);
        }
        .donate-btn {
            background: linear-gradient(90deg, #8b0000, #4b0082) !important;
            color: #d4c4a8 !important; border: 1px solid #8b0000 !important;
            animation: pulse 3s infinite;
        }
        .donate-btn:hover {
            box-shadow: 0 5px 25px rgba(139, 0, 0, 0.6) !important;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); } }

        .profile-img {
            width: 130px; height: 130px; border-radius: 50%; object-fit: cover;
            border: 3px solid #8b0000;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.5), 0 0 60px rgba(75, 0, 130, 0.2);

        display: block;
        width: fit-content;
        margin: 0 auto 1.5rem;
        line-height: 0;
        }

        .profile-img {
        display: block;
        }
    </style>
